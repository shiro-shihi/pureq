name: Release

on:
  push:
    tags:
      - "@pureq/*@*"  # @pureq/pureq@1.1.7, @pureq/auth@0.1.0
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Required for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Extract package name and version from tag
        id: package
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Parse tag format: @pureq/pureq@1.1.7
          SCOPE=$(echo "$TAG" | cut -d/ -f1)
          PKG_AND_VER=$(echo "$TAG" | cut -d/ -f2)
          PACKAGE_NAME=$(echo "$PKG_AND_VER" | cut -d@ -f1)
          VERSION=$(echo "$PKG_AND_VER" | cut -d@ -f2)
          
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "filter=@pureq/$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          FILTER="${{ steps.package.outputs.filter }}"
          PKG_VERSION=$(jq -r '.version' "packages/${{ steps.package.outputs.name }}/package.json")
          TAG_VERSION="${{ steps.package.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "✓ Version match: $TAG_VERSION"

      - name: Run tests for ${{ steps.package.outputs.name }}
        run: pnpm --filter "@pureq/${{ steps.package.outputs.name }}" run test:ci

      - name: Build ${{ steps.package.outputs.name }}
        run: pnpm --filter "@pureq/${{ steps.package.outputs.name }}" run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Publish ${{ steps.package.outputs.name }} to npm
        run: pnpm --filter "@pureq/${{ steps.package.outputs.name }}" publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
